<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D | Yuki</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #three-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .three-overlay {
      position: relative;
      z-index: 1;
    }

    .coming-soon-hero {
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .coming-soon-hero .badge {
      display: inline-block;
      background: rgba(129, 140, 248, 0.15);
      border: 1px solid rgba(129, 140, 248, 0.3);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 16px;
      border-radius: 20px;
      margin-bottom: 28px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .coming-soon-hero h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #e2e2f0 0%, #818cf8 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .coming-soon-hero p {
      color: var(--muted);
      max-width: 480px;
      font-size: 0.95rem;
      margin-bottom: 40px;
      line-height: 1.8;
    }

    .vision-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      max-width: 640px;
      width: 100%;
    }

    .vision-card {
      background: rgba(19, 19, 26, 0.85);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: left;
      backdrop-filter: blur(8px);
    }

    .vision-card .icon { font-size: 1.4rem; margin-bottom: 10px; }
    .vision-card .title { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .vision-card .desc  { font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>

<canvas id="three-bg"></canvas>

<div class="three-overlay">
  <nav>
    <a href="index.html" class="nav-logo">Yuki</a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="3d.html">3D</a></li>
    </ul>
  </nav>

  <div class="coming-soon-hero">
    <div class="badge">Coming Soon</div>
    <h1>3D Gallery</h1>
    <p>
      Blenderで作ったモデルたちをここに展示する予定です。<br>
      Three.jsを使って、ブラウザ上でインタラクティブに動かせるギャラリーにします。
    </p>

    <div class="vision-cards">
      <div class="vision-card">
        <div class="icon">🎨</div>
        <div class="title">Blender制作</div>
        <div class="desc">過去に制作した3Dモデルを .glb 形式で展示予定</div>
      </div>
      <div class="vision-card">
        <div class="icon">🖱</div>
        <div class="title">インタラクティブ</div>
        <div class="desc">マウス・タッチで自由に動かせるビューワー</div>
      </div>
      <div class="vision-card">
        <div class="icon">🌐</div>
        <div class="title">Web埋め込み</div>
        <div class="desc">Three.js / WebGL でフルブラウザ対応</div>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
  {"imports": {"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
  import * as THREE from 'three';

  const canvas = document.getElementById('three-bg');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 5;

  // 浮遊するオブジェクト群
  const objects = [];
  const geometries = [
    new THREE.IcosahedronGeometry(0.4, 0),
    new THREE.TorusGeometry(0.3, 0.12, 8, 20),
    new THREE.OctahedronGeometry(0.35, 0),
    new THREE.TorusKnotGeometry(0.25, 0.08, 60, 8),
  ];

  const material = new THREE.MeshStandardMaterial({
    color: 0x818cf8,
    wireframe: true,
    transparent: true,
    opacity: 0.35,
  });

  for (let i = 0; i < 18; i++) {
    const geo = geometries[i % geometries.length];
    const mesh = new THREE.Mesh(geo, material.clone());
    mesh.position.set(
      (Math.random() - 0.5) * 14,
      (Math.random() - 0.5) * 10,
      (Math.random() - 0.5) * 6 - 2
    );
    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
    mesh.userData.speed = {
      x: (Math.random() - 0.5) * 0.003,
      y: (Math.random() - 0.5) * 0.003,
      z: (Math.random() - 0.5) * 0.002,
    };
    // ランダムに accent / accent2 カラー
    mesh.material.color.set(Math.random() > 0.5 ? 0x818cf8 : 0xa78bfa);
    scene.add(mesh);
    objects.push(mesh);
  }

  // ライト
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0x818cf8, 1.5);
  dirLight.position.set(3, 4, 5);
  scene.add(dirLight);

  // マウス追従
  let mouse = { x: 0, y: 0 };
  window.addEventListener('mousemove', e => {
    mouse.x = (e.clientX / window.innerWidth  - 0.5) * 0.4;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 0.4;
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  const clock = new THREE.Clock();

  (function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    objects.forEach(obj => {
      obj.rotation.x += obj.userData.speed.x;
      obj.rotation.y += obj.userData.speed.y;
      obj.position.y += Math.sin(t * 0.4 + obj.position.x) * 0.0008;
    });

    camera.position.x += (mouse.x - camera.position.x) * 0.03;
    camera.position.y += (-mouse.y - camera.position.y) * 0.03;
    camera.lookAt(scene.position);

    renderer.render(scene, camera);
  })();
</script>

<script>
  document.querySelectorAll('.nav-links a').forEach(a => {
    if (a.href === location.href) a.classList.add('active');
  });
</script>

</body>
</html>
